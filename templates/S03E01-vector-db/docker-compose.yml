
services:
  db:
    # Official Postgres image with pgvector pre-installed.
    # No manual extension setup needed — it ships ready to enable.
    image: pgvector/pgvector:pg17

    # Custom container name — overrides the default "projectfolder-db-1".
    container_name: ${CONTAINER_NAME:-pgvector-db}

    # Restart automatically after host reboot.
    restart: unless-stopped

    # Credentials loaded from .env — keep secrets out of the repo.
    env_file:
      - .env.composeS03E01

    environment:
      # Allow all local connections without a password.
      POSTGRES_HOST_AUTH_METHOD: trust

    ports:
      # host:container — change the left side if 5432 is already taken.
      - "5432:5432"

    volumes:
      # Named volume so data survives `docker compose down`.
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:

# to run: 
# docker compose up -d

# hard restart:
# docker compose down -v && docker compose up -d