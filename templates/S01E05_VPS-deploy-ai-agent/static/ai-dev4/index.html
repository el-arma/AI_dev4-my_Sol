<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>AI_devs4 — progress</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;600&family=IBM+Plex+Sans:wght@300;400&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg:       #080e09;
      --surface:  #0d1a0f;
      --border:   #1a3320;
      --green:    #22c55e;
      --green-dim:#16a34a;
      --muted:    #4a6b52;
      --text:     #d4e8d8;
      --text-dim: #6b8f72;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'IBM Plex Mono', monospace;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
      /* subtle scanline texture */
      background-image: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 2px,
        rgba(0,0,0,0.07) 2px,
        rgba(0,0,0,0.07) 4px
      );
    }

    /* ── wrapper ─────────────────────────────── */
    .card {
      width: 100%;
      max-width: 560px;
      border: 1px solid var(--border);
      background: var(--surface);
      padding: 36px 40px 40px;
      position: relative;
      animation: fadeUp .5s ease both;
      overflow: hidden;
    }

    /* corner accent */
    .card::before {
      content: '';
      position: absolute;
      top: -1px; left: -1px;
      width: 32px; height: 32px;
      border-top: 2px solid var(--green);
      border-left: 2px solid var(--green);
    }
    .card::after {
      content: '';
      position: absolute;
      bottom: -1px; right: -1px;
      width: 32px; height: 32px;
      border-bottom: 2px solid var(--green);
      border-right: 2px solid var(--green);
    }

    /* ── header ──────────────────────────────── */
    .header {
      display: flex;
      align-items: baseline;
      gap: 10px;
      margin-bottom: 32px;
    }

    .logo {
      font-size: .7rem;
      color: var(--green);
      letter-spacing: .15em;
      text-transform: uppercase;
    }

    .title {
      font-size: 1.05rem;
      font-weight: 600;
      color: var(--text);
      letter-spacing: .04em;
    }

    .header-sep {
      flex: 1;
      height: 1px;
      background: var(--border);
      margin-left: 4px;
    }

    /* ── stats row ───────────────────────────── */
    .stats {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-bottom: 28px;
    }

    .stat {
      border: 1px solid var(--border);
      padding: 16px 18px;
      position: relative;
      overflow: hidden;
    }

    .stat-label {
      font-size: .65rem;
      letter-spacing: .14em;
      text-transform: uppercase;
      color: var(--text-dim);
      margin-bottom: 8px;
    }

    .stat-value {
      font-size: 1.9rem;
      font-weight: 600;
      line-height: 1;
      color: var(--green);
    }

    .stat-total {
      font-size: .95rem;
      color: var(--muted);
    }

    .stat-bar {
      position: absolute;
      bottom: 0; left: 0;
      height: 2px;
      background: var(--green);
      transition: width 1s cubic-bezier(.16,1,.3,1);
    }

    /* ── progress bar section ────────────────── */
    .section-label {
      font-size: .65rem;
      letter-spacing: .14em;
      text-transform: uppercase;
      color: var(--text-dim);
      margin-bottom: 10px;
    }

    .progress-wrap {
      margin-bottom: 28px;
    }

    .progress-track {
      height: 6px;
      background: var(--border);
      position: relative;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      background: var(--green);
      transition: width 1s cubic-bezier(.16,1,.3,1);
      position: relative;
    }

    .progress-fill::after {
      content: '';
      position: absolute;
      right: 0; top: 0;
      width: 4px; height: 100%;
      background: #fff;
      opacity: .7;
    }

    .progress-labels {
      display: flex;
      justify-content: space-between;
      margin-top: 7px;
      font-size: .68rem;
      color: var(--muted);
    }

    /* ── task grid ───────────────────────────── */
    .tasks-grid {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 4px;
      margin-bottom: 28px;
    }

    .tile {
      aspect-ratio: 1.4;
      border: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 3px;
      animation: fadeUp .35s ease both;
      transition: border-color .2s, background .2s;
    }
    .tile.done {
      background: #0a1f0d;
      border-color: #1f3d28;
    }
    .tile.done:hover { border-color: var(--green); }
    .tile.pending { background: var(--bg); }

    .tile-num {
      font-size: .75rem;
      font-weight: 600;
      letter-spacing: .03em;
      color: var(--text-dim);
      line-height: 1;
    }
    .tile.done .tile-num { color: var(--green); }

    .tile-check {
      font-size: .55rem;
      color: var(--green-dim);
      line-height: 1;
    }

    /* ── image ───────────────────────────────── */
    .map-wrap {
      border: 1px solid var(--border);
      overflow: hidden;
      margin-bottom: 28px;
      position: relative;
      width: 100%;
    }

    .map-wrap img {
      width: 100%;
      max-width: 100%;
      height: auto;
      display: block;
      filter: saturate(.8) brightness(.85);
      transition: filter .3s;
    }

    .map-wrap:hover img { filter: saturate(1) brightness(.95); }

    .map-overlay {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      padding: 10px 14px;
      background: linear-gradient(transparent, rgba(8,14,9,.9));
      font-size: .65rem;
      letter-spacing: .1em;
      color: var(--text-dim);
      text-transform: uppercase;
    }

    /* ── footer ──────────────────────────────── */
    .footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: .65rem;
      color: var(--text-dim);
      letter-spacing: .08em;
    }

    .status-dot {
      display: inline-block;
      width: 6px; height: 6px;
      background: var(--green);
      border-radius: 50%;
      margin-right: 6px;
      animation: pulse 2s ease infinite;
    }

    /* ── animations ──────────────────────────── */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50%       { opacity: .3; }
    }
  </style>
</head>
<body>

<div class="card">

  <!-- header -->
  <div class="header">
    <span class="logo">AI_devs4</span>
    <span class="title">progress tracker</span>
    <div class="header-sep"></div>
  </div>

  <!-- stats -->
  <div class="stats">
    <div class="stat" id="stat-points">
      <div class="stat-label">Points</div>
      <div class="stat-value">
        <span id="pts-val">6</span><span class="stat-total">/25</span>
      </div>
      <div class="stat-bar" id="bar-pts" style="width:0%"></div>
    </div>
    <div class="stat" id="stat-secrets">
      <div class="stat-label">Secrets</div>
      <div class="stat-value">
        <span id="sec-val">0</span><span class="stat-total">/21</span>
      </div>
      <div class="stat-bar" id="bar-sec" style="width:0%"></div>
    </div>
  </div>

  <!-- overall progress bar -->
  <div class="progress-wrap">
    <div class="section-label">Overall progress</div>
    <div class="progress-track">
      <div class="progress-fill" id="overall-fill" style="width:0%"></div>
    </div>
    <div class="progress-labels">
      <span>0%</span>
      <span id="pct-label">0%</span>
      <span>100%</span>
    </div>
  </div>

  <!-- map image -->
  <div class="map-wrap">
    <img src="/static/ai-dev4/progress.png" alt="mission map" />
    <div class="map-overlay">mission map · live update</div>
  </div>

  <!-- task grid – generated by JS below -->
  <div class="section-label" style="margin-bottom:10px">Tasks</div>
  <div class="tasks-grid" id="task-grid"></div>

  <!-- footer -->
  <div class="footer">
    <span><span class="status-dot"></span>connected to HQ</span>
    <span id="update-time">—</span>
  </div>

</div>

<script>
  // ── data – swap with your backend fetch ──────────────────
  const points      = 6,   pointsMax  = 25;
  const secrets     = 0,   secretsMax = 21;
  const totalTasks  = 25;
  const doneTasks   = 6;

  // ── build task grid ──────────────────────────────────────
  const grid = document.getElementById('task-grid');
  for (let i = 1; i <= totalTasks; i++) {
    const done = i <= doneTasks;
    const delay = (i * 0.03).toFixed(2);

    const tile = document.createElement('div');
    tile.className = 'tile ' + (done ? 'done' : 'pending');
    tile.style.animationDelay = delay + 's';

    tile.innerHTML = `
      <span class="tile-num">${String(i).padStart(2,'0')}</span>
      ${done ? '<span class="tile-check">✓</span>' : ''}
    `;
    grid.appendChild(tile);
  }

  // ── animate bars on load ─────────────────────────────────
  requestAnimationFrame(() => {
    setTimeout(() => {
      const pctPts = (points / pointsMax) * 100;
      const pctSec = (secrets / secretsMax) * 100;

      document.getElementById('bar-pts').style.width      = pctPts + '%';
      document.getElementById('bar-sec').style.width      = pctSec + '%';
      document.getElementById('overall-fill').style.width = pctPts + '%';
      document.getElementById('pct-label').textContent    = Math.round(pctPts) + '%';
    }, 120);
  });

  // ── timestamp ────────────────────────────────────────────
  const d = new Date();
  document.getElementById('update-time').textContent =
    d.toLocaleDateString('en-GB') + ' ' +
    d.toLocaleTimeString('en-GB', { hour: '2-digit', minute: '2-digit' });

  /* ── example: fetch from your backend ─────────────────────
  fetch('/api/progress')
    .then(r => r.json())
    .then(data => {
      // data.points, data.secrets, data.doneTasks
      // re-render tiles or update counters here
    });
  ──────────────────────────────────────────────────────── */
</script>
</body>
</html>
