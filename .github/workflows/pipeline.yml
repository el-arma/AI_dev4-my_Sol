name: CI

on:
  push:
    branches:
      - master
    paths-ignore:
      - 'README.md'

# Global environment variables used across the workflow
env:
  # Google Cloud project ID
  PROJECT_ID: project-86ba0137-6b38-4259-b08

  # Cloud Run service name
  SERVICE: power-plant-delivery-service

  # Deployment region
  REGION: europe-central2

  # Base path for the Docker image in Artifact Registry
  # Format: REGION-docker.pkg.dev/PROJECT_ID/REPOSITORY/IMAGE
  IMAGE_BASE: europe-central2-docker.pkg.dev/project-86ba0137-6b38-4259-b08/my-apps-repo/ai-dev4s01e03-backend
  # SECRETS:
  OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
  AI_DEV4_API_KEY: ${{ secrets.AI_DEV4_API_KEY }}
  # ENV Vars:
  BASE_URL: ${{ vars.BASE_URL }}
  VERIFICATION_ENDPOINT: ${{ vars.VERIFICATION_ENDPOINT }}
  S01E03_PACKAGE_STATUS_URL: ${{ vars.S01E03_PACKAGE_STATUS_URL }}

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      # Checkout repository code
      - name: Checkout repository
        uses: actions/checkout@v4

      # Setup Python environment
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # Install project dependencies
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r my_Solutions/S01E03/requirements-dev.txt

      # Run test suite
      - name: Run tests
        run: |
          PYTHONPATH=my_Solutions/S01E03 pytest -v
          
  deploy:
    # GitHub Actions runner environment
    needs: test
    runs-on: ubuntu-latest

    steps:

    # Checkout repository code
    - name: Checkout
      uses: actions/checkout@v4

    # Generate a short commit SHA (first 7 characters)
    # Used as the Docker image tag
    - name: Short SHA
      run: echo "SHORT_SHA=${GITHUB_SHA::7}" >> $GITHUB_ENV

    # Authenticate to Google Cloud using a Service Account
    # Credentials are stored in GitHub Secrets
    - name: Authenticate to GCP
      uses: google-github-actions/auth@v2
      with:
        credentials_json: ${{ secrets.GCP_CREDENTIALS }}

    # Install and configure gcloud CLI
    - name: Setup gcloud
      uses: google-github-actions/setup-gcloud@v2

    # Configure Docker authentication for Artifact Registry
    # Allows docker push to the registry
    - name: Configure docker auth
      run: gcloud auth configure-docker europe-central2-docker.pkg.dev

    # Build Docker image from the application directory
    - name: Build image
      run: docker build -t $IMAGE_BASE:$SHORT_SHA ./my_Solutions/S01E03

    # Push the image to Artifact Registry
    - name: Push image
      run: docker push $IMAGE_BASE:$SHORT_SHA

    - name: Deploy
      run: |
        gcloud run deploy $SERVICE \
          --image $IMAGE_BASE:$SHORT_SHA \
          --set-env-vars BASE_URL=$BASE_URL \
          --set-env-vars VERIFICATION_ENDPOINT=$VERIFICATION_ENDPOINT \
          --set-env-vars S01E03_PACKAGE_STATUS_URL=$S01E03_PACKAGE_STATUS_URL \
          --set-secrets OPENAI_API_KEY=openai-api-key:latest \
          --set-secrets AI_DEV4_API_KEY=ai-dev4-api-key:latest \
          --region $REGION \
          --platform managed \
          --allow-unauthenticated
      # public HTTP endpoint (everyone can do request)