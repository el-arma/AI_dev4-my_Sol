name: Hetzner Docker Deploy WF
on:
  push:
    branches: master
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh  
          echo "${{ secrets.HETZNER_VPS_DEPLOY_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H ${{ secrets.HETZNER_VPS_DEPLOY_HOST }} >> ~/.ssh/known_hosts
      - name: Deploy to VPS
        run: |
          ssh ${{ secrets.HETZNER_VPS_DEPLOY_USER }}@${{ secrets.HETZNER_VPS_DEPLOY_HOST }} << EOF
            if [ -d "/deploy/build-app" ] && [ ! -d "/deploy/build-app/.git" ]; then
              rm -rf /deploy/build-app
            fi
            if [ ! -d "/deploy/build-app/.git" ]; then
              git clone --filter=blob:none --sparse "https://github.com/el-arma/AI_dev4-my_Sol.git" /deploy/build-app
              cd /deploy/build-app
              git sparse-checkout set "templates/S01E05_VPS-deploy-ai-agent"
            else
              cd /deploy/build-app
              git fetch origin
              git reset --hard origin/master
            fi
            echo "PYDANTIC_AI_GATEWAY_API_KEY=${{ secrets.PYDANTIC_AI_GATEWAY_API_KEY }}" > /deploy/build-app/templates/S01E05_VPS-deploy-ai-agent/.env
            echo "LOGFIRE_TOKEN=${{ secrets.LOGFIRE_TOKEN }}" >> /deploy/build-app/templates/S01E05_VPS-deploy-ai-agent/.env
            cd /deploy/build-app/templates/S01E05_VPS-deploy-ai-agent
            docker-compose down
            docker-compose up -d --build
          EOF